<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dion's AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

width:100vw;
height:100vh;

background:
radial-gradient(circle at top,#2563eb80,transparent 40%),
radial-gradient(circle at bottom,#9333ea80,transparent 40%),
#020617;

color:white;

overflow:hidden;

}



/* MAIN APP */

.container{

width:100vw;
height:100vh;

display:flex;

flex-direction:column;

background:rgba(15,23,42,.85);

backdrop-filter:blur(25px);

}



/* HEADER */

.header{
height:84px;
padding:18px 30px;

display:flex;
align-items:center;
justify-content:space-between;

background:rgba(15,23,42,.7);
backdrop-filter:blur(20px);

border-bottom:1px solid rgba(255,255,255,.08);
}




.brand{

display:flex;

align-items:center;

gap:25px;

}



/* LOGO */

.logo{

width:85px;

height:85px;

border-radius:25px;

overflow:hidden;

background:white;

box-shadow:
0 0 30px rgba(255,255,255,.4);

}


.logo img{

width:100%;

height:100%;

object-fit:cover;

}



/* TITLE */

.name{

font-size:42px;

font-weight:900;

}



.subtitle{

font-size:16px;

opacity:.85;

}



.status{

display:flex;

align-items:center;

gap:10px;

font-size:18px;

}


.online{

width:15px;

height:15px;

background:#22c55e;

border-radius:50%;

box-shadow:
0 0 20px #22c55e;

}



/* CHAT AREA */

.chat{

    flex:1;

    max-width:900px;

    width:100%;

    margin:0 auto;

    padding:40px 20px;

    overflow-y:auto;

    scroll-behavior:smooth;

}


/* UNIQUE SCROLLBAR */

.chat::-webkit-scrollbar{

width:12px;

}


.chat::-webkit-scrollbar-track{

background:rgba(255,255,255,.05);

border-radius:20px;

}


.chat::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
#2563eb,
#9333ea
);

border-radius:20px;

border:3px solid transparent;

background-clip:padding-box;

}


.chat::-webkit-scrollbar-thumb:hover{

background:
linear-gradient(
180deg,
#3b82f6,
#a855f7
);

background-clip:padding-box;

}



/* MESSAGES */

.message{

max-width:850px;
width:fit-content;

padding:18px 22px;

margin:18px 0;

border-radius:18px;

font-size:16px;
line-height:1.8;

white-space:pre-wrap;
word-break:break-word;

animation:pop .25s ease;

box-shadow:
0 8px 24px rgba(0,0,0,.25);

transition:all .25s ease;

}

@keyframes messageIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}



.ai{

background:#1e293b;

border:1px solid rgba(255,255,255,.06);

border-radius:18px;

margin-right:auto;

}



.user{

margin-left:auto;

background:linear-gradient(
135deg,
#2563eb,
#7c3aed
);

color:white;

border-radius:18px;

}




@keyframes pop {

    0% {
        opacity: 0;
        transform: translateY(18px) scale(.98);
    }

    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}



/* THINKING ANIMATION */

.thinking{

display:flex;

align-items:center;

gap:8px;

}



.dot{

width:8px;

height:8px;

background:white;

border-radius:50%;

animation:bounce 1.2s infinite;

}



.dot:nth-child(2){

animation-delay:.2s;

}


.dot:nth-child(3){

animation-delay:.4s;

}



@keyframes bounce{

0%,100%{

transform:translateY(0);

opacity:.4;

}


50%{

transform:translateY(-8px);

opacity:1;

}

}



/* INPUT */

.input-area{

position:sticky;
bottom:0;

padding:20px;

background:linear-gradient(
180deg,
transparent,
#020617 35%
);

backdrop-filter:blur(20px);

}

.composer{

display:flex;
align-items:flex-end;
gap:14px;

max-width:1100px;
margin:auto;

padding:14px;

background:rgba(30,41,59,.75);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

border-radius:24px;

box-shadow:
0 10px 40px rgba(0,0,0,.35);

}

textarea{

flex:1;

background:transparent;

border:none;

outline:none;

resize:none;

color:white;

font-size:17px;

line-height:1.6;

max-height:180px;
min-height:28px;

padding:6px;

overflow-y:auto;

}

textarea::placeholder{

color:#94a3b8;

}

textarea:disabled{

opacity:.5;

}

button{

width:52px;
height:52px;

display:flex;
align-items:center;
justify-content:center;

border:none;

border-radius:16px;

cursor:pointer;

background:linear-gradient(
135deg,
#2563eb,
#9333ea
);

transition:.25s;

flex-shrink:0;

}

button:hover{

transform:translateY(-2px) scale(1.05);

box-shadow:
0 8px 25px rgba(37,99,235,.45);

}

button:active{

transform:scale(.95);

}

button:disabled{

opacity:.45;
cursor:not-allowed;
box-shadow:none;

}



/* MOBILE */

@media(max-width:700px){

.header{

padding:20px;

}


.name{

font-size:26px;

}


.logo{

width:60px;

height:60px;

}


.chat{

padding:20px;

}


.input-area{

padding:15px;

}


button{

padding:0 20px;

}

}

</style>

</head>


<body>


<div class="container">


<div class="header">


<div class="brand">


<div class="logo">

<img src="logo.png" alt="Dion AI Logo">

</div>


<div>

<div class="name">
Dion's AI
</div>


<div class="subtitle">
Powered by DION DANIEL LOBO ENTERPRISES
</div>


</div>


</div>


<div class="status">

<div class="online"></div>

Online

</div>


</div>





<div class="chat" id="chat">


<div class="message ai">

Welcome to Dion's AI 🤖

<br><br>

How can I assist you today?

</div>


</div>





<div class="input-area">

    <div class="composer">

        <textarea
            id="input"
            rows="1"
            placeholder="Message Dion's AI..."
        ></textarea>

        <button id="send" onclick="send()">

            <svg xmlns="http://www.w3.org/2000/svg"
                 width="22"
                 height="22"
                 fill="white"
                 viewBox="0 0 24 24">

                <path d="M2 21L23 12L2 3L2 10L17 12L2 14L2 21Z"/>

            </svg>

        </button>

    </div>

</div>







<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

// Auto-grow textarea
input.addEventListener("input", () => {

    input.style.height = "28px";
    input.style.height = input.scrollHeight + "px";

});

let thinking = false;

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
}

function typeMessage(text, type) {

    const msg = document.createElement("div");
    msg.className = "message " + type;
    chat.appendChild(msg);

    let index = 0;

    function type() {

        if (index >= text.length) return;

        // Type 1-3 characters at a time
        const amount = Math.floor(Math.random() * 3) + 1;

        msg.textContent += text.slice(index, index + amount);

        index += amount;

        chat.scrollTop = chat.scrollHeight;

        let delay = 18 + Math.random() * 15;

        const lastChar = msg.textContent.slice(-1);

        if (lastChar === " ") delay = 8;
        if (lastChar === ",") delay = 110;
        if (lastChar === ".") delay = 220;
        if (lastChar === "!") delay = 220;
        if (lastChar === "?") delay = 220;
        if (lastChar === "\n") delay = 170;

        requestAnimationFrame(() => {
            setTimeout(type, delay);
        });

    }

    type();

}
async function send() {

    if (thinking) return;

    const message = input.value.trim();

    if (!message) return;

    thinking = true;

    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = "Dion's AI is replying...";

    addMessage(message, "user");

    input.value = "";

    const loading = document.createElement("div");

    loading.className = "message ai thinking";

    loading.innerHTML = `
        Dion's AI is thinking
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {

        const response = await fetch("https://dions-ai.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        console.log(response.status);
        console.log(data);

        loading.remove();

        if (!response.ok) {
            addMessage(data.reply || "Server Error", "ai");
        } else {
            typeMessage(data.reply, "ai");
        }

    } catch (error) {

        loading.remove();

        addMessage(
            "⚠️ Cannot connect to Dion's AI server.",
            "ai"
        );

        console.error(error);

    }

    thinking = false;

    input.disabled = false;
    sendBtn.disabled = false;
    input.placeholder = "Message Dion's AI...";
    input.focus();
}

input.addEventListener("keydown", function(e) {

    if (e.key === "Enter" && !e.shiftKey) {

        e.preventDefault();

        send();

    }

});
</script>


</body>

</html>
