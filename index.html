<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dion's AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

width:100vw;
height:100vh;

background:
radial-gradient(circle at top,#2563eb80,transparent 40%),
radial-gradient(circle at bottom,#9333ea80,transparent 40%),
#020617;

color:white;

overflow:hidden;

}



/* MAIN APP */

.container{

width:100vw;
height:100vh;

display:flex;

flex-direction:column;

background:rgba(15,23,42,.85);

backdrop-filter:blur(25px);

}



/* HEADER */

.header{

height:120px;

padding:25px 45px;

display:flex;

align-items:center;

justify-content:space-between;

background:
linear-gradient(
135deg,
#2563eb,
#9333ea
);

}



.brand{

display:flex;

align-items:center;

gap:25px;

}



/* LOGO */

.logo{

width:85px;

height:85px;

border-radius:25px;

overflow:hidden;

background:white;

box-shadow:
0 0 30px rgba(255,255,255,.4);

}


.logo img{

width:100%;

height:100%;

object-fit:cover;

}



/* TITLE */

.name{

font-size:42px;

font-weight:900;

}



.subtitle{

font-size:16px;

opacity:.85;

}



.status{

display:flex;

align-items:center;

gap:10px;

font-size:18px;

}


.online{

width:15px;

height:15px;

background:#22c55e;

border-radius:50%;

box-shadow:
0 0 20px #22c55e;

}



/* CHAT AREA */

.chat{

flex:1;

padding:40px;

overflow-y:auto;

scroll-behavior:smooth;

}


/* UNIQUE SCROLLBAR */

.chat::-webkit-scrollbar{

width:12px;

}


.chat::-webkit-scrollbar-track{

background:rgba(255,255,255,.05);

border-radius:20px;

}


.chat::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
#2563eb,
#9333ea
);

border-radius:20px;

border:3px solid transparent;

background-clip:padding-box;

}


.chat::-webkit-scrollbar-thumb:hover{

background:
linear-gradient(
180deg,
#3b82f6,
#a855f7
);

background-clip:padding-box;

}



/* MESSAGES */

.message{

max-width:75%;
padding:20px 24px;
margin:18px 0;

border-radius:22px;

font-size:17px;
line-height:1.7;

white-space:pre-wrap;
word-break:break-word;

opacity:0;
transform:translateY(18px) scale(.98);

animation:pop .28s cubic-bezier(.2,.8,.2,1) forwards;

box-shadow:0 10px 30px rgba(0,0,0,.25);

}


@keyframes messageIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}



.ai{

background:
linear-gradient(
135deg,
#1e293b,
#334155
);

border-bottom-left-radius:5px;

}



.user{

margin-left:auto;

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

border-bottom-right-radius:5px;



}



@keyframes pop {

    0% {
        opacity: 0;
        transform: translateY(18px) scale(.98);
    }

    100% {
        opacity: 1;
        transform: translateY(0) scale(1);
    }

}



/* THINKING ANIMATION */

.thinking{

display:flex;

align-items:center;

gap:8px;

}



.dot{

width:8px;

height:8px;

background:white;

border-radius:50%;

animation:bounce 1.2s infinite;

}



.dot:nth-child(2){

animation-delay:.2s;

}


.dot:nth-child(3){

animation-delay:.4s;

}



@keyframes bounce{

0%,100%{

transform:translateY(0);

opacity:.4;

}


50%{

transform:translateY(-8px);

opacity:1;

}

}



/* INPUT */

.input-area{

display:flex;

gap:15px;

padding:30px 45px;

background:#020617;

}



input{

flex:1;

height:70px;

padding:0 30px;

border-radius:35px;

background:#020617;

border:1px solid #475569;

color:white;

font-size:18px;

outline:none;

}



input:disabled{

opacity:.5;

cursor:not-allowed;

}



button{

height:70px;

padding:0 45px;

border-radius:35px;

border:none;

background:
linear-gradient(
135deg,
#2563eb,
#9333ea
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.05);

}



button:disabled{

opacity:.5;

cursor:not-allowed;

}



/* MOBILE */

@media(max-width:700px){

.header{

padding:20px;

}


.name{

font-size:26px;

}


.logo{

width:60px;

height:60px;

}


.chat{

padding:20px;

}


.input-area{

padding:15px;

}


button{

padding:0 20px;

}

}

</style>

</head>


<body>


<div class="container">


<div class="header">


<div class="brand">


<div class="logo">

<img src="logo.png" alt="Dion AI Logo">

</div>


<div>

<div class="name">
Dion's AI
</div>


<div class="subtitle">
Powered by DION DANIEL LOBO ENTERPRISES
</div>


</div>


</div>


<div class="status">

<div class="online"></div>

Online

</div>


</div>





<div class="chat" id="chat">


<div class="message ai">

Welcome to Dion's AI 🤖

<br><br>

How can I assist you today?

</div>


</div>





<div class="input-area">


<input 
id="input"
placeholder="Message Dion's AI..."
>


<button id="send" onclick="send()">

Send

</button>


</div>


</div>





<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");

let thinking = false;

function addMessage(text, type) {
    const msg = document.createElement("div");
    msg.className = "message " + type;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
    return msg;
}

function typeMessage(text, type) {

    const msg = document.createElement("div");
    msg.className = "message " + type;
    chat.appendChild(msg);

    let i = 0;

    function type() {

        // Type 1-4 characters at a time
        const chunk = Math.floor(Math.random() * 4) + 1;

        msg.textContent += text.slice(i, i + chunk);

        i += chunk;

        chat.scrollTop = chat.scrollHeight;

        if (i < text.length) {

            let speed = 20;

            const last = text.charAt(i - 1);

            if (last === " ") speed = 15;
            if (last === ",") speed = 120;
            if (last === ".") speed = 220;
            if (last === "!") speed = 220;
            if (last === "?") speed = 220;
            if (last === "\n") speed = 180;

            speed += Math.random() * 15;

            setTimeout(type, speed);

        }

    }

    type();

}
async function send() {

    if (thinking) return;

    const message = input.value.trim();

    if (!message) return;

    thinking = true;

    input.disabled = true;
    sendBtn.disabled = true;
    input.placeholder = "Dion's AI is replying...";

    addMessage(message, "user");

    input.value = "";

    const loading = document.createElement("div");

    loading.className = "message ai thinking";

    loading.innerHTML = `
        Dion's AI is thinking
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    `;

    chat.appendChild(loading);
    chat.scrollTop = chat.scrollHeight;

    try {

        const response = await fetch("https://dions-ai.onrender.com/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();

        console.log(response.status);
        console.log(data);

        loading.remove();

        if (!response.ok) {
            addMessage(data.reply || "Server Error", "ai");
        } else {
            typeMessage(data.reply, "ai");
        }

    } catch (error) {

        loading.remove();

        addMessage(
            "⚠️ Cannot connect to Dion's AI server.",
            "ai"
        );

        console.error(error);

    }

    thinking = false;

    input.disabled = false;
    sendBtn.disabled = false;
    input.placeholder = "Message Dion's AI...";
    input.focus();
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        send();
    }
});
</script>


</body>

</html>
