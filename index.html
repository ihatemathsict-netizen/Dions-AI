<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dion's AI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",Arial,sans-serif;
}


body{

width:100vw;
height:100vh;

background:
radial-gradient(circle at top,#2563eb80,transparent 40%),
radial-gradient(circle at bottom,#9333ea80,transparent 40%),
#020617;

color:white;

overflow:hidden;

}



/* MAIN APP */

.container{

width:100vw;
height:100vh;

display:flex;

flex-direction:column;

background:rgba(15,23,42,.85);

backdrop-filter:blur(25px);

}



/* HEADER */

.header{

height:120px;

padding:25px 45px;

display:flex;

align-items:center;

justify-content:space-between;

background:
linear-gradient(
135deg,
#2563eb,
#9333ea
);

}



.brand{

display:flex;

align-items:center;

gap:25px;

}



/* LOGO */

.logo{

width:85px;

height:85px;

border-radius:25px;

overflow:hidden;

background:white;

box-shadow:
0 0 30px rgba(255,255,255,.4);

}


.logo img{

width:100%;

height:100%;

object-fit:cover;

}



/* TITLE */

.name{

font-size:42px;

font-weight:900;

}



.subtitle{

font-size:16px;

opacity:.85;

}



.status{

display:flex;

align-items:center;

gap:10px;

font-size:18px;

}


.online{

width:15px;

height:15px;

background:#22c55e;

border-radius:50%;

box-shadow:
0 0 20px #22c55e;

}



/* CHAT AREA */

.chat{

flex:1;

padding:40px;

overflow-y:auto;

scroll-behavior:smooth;

}


/* UNIQUE SCROLLBAR */

.chat::-webkit-scrollbar{

width:12px;

}


.chat::-webkit-scrollbar-track{

background:rgba(255,255,255,.05);

border-radius:20px;

}


.chat::-webkit-scrollbar-thumb{

background:
linear-gradient(
180deg,
#2563eb,
#9333ea
);

border-radius:20px;

border:3px solid transparent;

background-clip:padding-box;

}


.chat::-webkit-scrollbar-thumb:hover{

background:
linear-gradient(
180deg,
#3b82f6,
#a855f7
);

background-clip:padding-box;

}



/* MESSAGES */

.message{

max-width:75%;

padding:22px 28px;

margin-bottom:20px;

border-radius:25px;

font-size:18px;

line-height:1.6;

animation:
messageIn .35s ease;

}



@keyframes messageIn{

from{

opacity:0;

transform:
translateY(25px)
scale(.95);

filter:blur(5px);

}


to{

opacity:1;

transform:
translateY(0)
scale(1);

filter:blur(0);

}

}



.ai{

background:
linear-gradient(
135deg,
#1e293b,
#334155
);

border-bottom-left-radius:5px;

}



.user{

margin-left:auto;

background:
linear-gradient(
135deg,
#2563eb,
#3b82f6
);

border-bottom-right-radius:5px;

}



/* INPUT */

.input-area{

display:flex;

gap:15px;

padding:30px 45px;

background:#020617;

}



input{

flex:1;

height:70px;

padding:0 30px;

border-radius:35px;

background:#020617;

border:1px solid #475569;

color:white;

font-size:18px;

outline:none;

}



input:disabled{

opacity:.5;

cursor:not-allowed;

}



button{

height:70px;

padding:0 45px;

border-radius:35px;

border:none;

background:
linear-gradient(
135deg,
#2563eb,
#9333ea
);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}



button:hover{

transform:scale(1.05);

}



button:disabled{

opacity:.5;

cursor:not-allowed;

}



/* MOBILE */

@media(max-width:700px){

.header{

padding:20px;

}


.name{

font-size:26px;

}


.logo{

width:60px;

height:60px;

}


.chat{

padding:20px;

}


.input-area{

padding:15px;

}


button{

padding:0 20px;

}

}

</style>

</head>


<body>


<div class="container">


<div class="header">


<div class="brand">


<div class="logo">

<img src="logo.png" alt="Dion AI Logo">

</div>


<div>

<div class="name">
Dion's AI
</div>


<div class="subtitle">
Powered by DION DANIEL LOBO ENTERPRISES
</div>


</div>


</div>


<div class="status">

<div class="online"></div>

Online

</div>


</div>





<div class="chat" id="chat">


<div class="message ai">

Welcome to Dion's AI 🤖

<br><br>

How can I assist you today?

</div>


</div>





<div class="input-area">


<input 
id="input"
placeholder="Message Dion's AI..."
>


<button id="send" onclick="send()">

Send

</button>


</div>


</div>





<script>


const chat=document.getElementById("chat");

const input=document.getElementById("input");

const sendBtn=document.getElementById("send");


let thinking=false;



function addMessage(text,type){


let msg=document.createElement("div");

msg.className="message "+type;

msg.innerText=text;

chat.appendChild(msg);

chat.scrollTop=chat.scrollHeight;


return msg;

}




async function send(){


if(thinking)return;


let message=input.value.trim();


if(!message)return;


thinking=true;


input.disabled=true;

sendBtn.disabled=true;

input.placeholder="Dion's AI is replying...";


addMessage(message,"user");


input.value="";



let loading=addMessage(
"Dion's AI is thinking...",
"ai"
);



try{


let response = await fetch(
    "https://dions-ai.onrender.com/chat",
    {
        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify({
            message: message
        })
    }
);


let data=await response.json();


loading.remove();


addMessage(
data.reply,
"ai"
);


}

catch(error){


loading.remove();


addMessage(
"⚠️ Cannot connect to Dion's AI server.",
"ai"
);


console.log(error);

}



thinking=false;


input.disabled=false;

sendBtn.disabled=false;

input.placeholder="Message Dion's AI...";

input.focus();


}




input.addEventListener(
"keydown",
function(e){

if(e.key==="Enter"){

send();

}

});


</script>


</body>

</html>
